model:
  d_model: 256
  nhead: 8
  num_encoder_layers: 3
  num_decoder_layers: 3
  dim_feedforward: 1024
  dropout: 0.1
  num_queries: 50
  num_classes: 10
  backbone_channels: 128

data:
  image_size: [128, 128]
  num_views: 6
  train_samples: 200
  val_samples: 50
  num_workers: 2
  seed: 42

train:
  batch_size: 4
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  clip_max_norm: 0.1
  log_interval: 10
  eval_interval: 1
  save_interval: 1
  bbox_loss_weight: 5.0
  amp: true
